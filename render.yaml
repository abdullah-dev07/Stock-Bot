services:
  - type: web
    name: stock-bot-backend
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --only-binary=:all: pydantic-core pydantic 2>/dev/null || pip install --prefer-binary pydantic==2.11.7 && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
